<!DOCTYPE html>
<html>
  <head>
    <title>Cinema Barcelona</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="font-family: sans-serif; padding: 20px;">
    <h1>🎬 Cinema Barcelona</h1>

    <input 
      id="search"
      placeholder="Search movie..."
      style="padding:10px; width:100%; margin-bottom:20px;"
    />

    <div id="app"></div>

    <script>
      let films = [];

      fetch("https://TUO-BACKEND.onrender.com/api/showtimes")
        .then(res => res.json())
        .then(data => {
          films = data;
          render(data);
        });

      document.getElementById("search").addEventListener("input", (e) => {
        const value = e.target.value.toLowerCase();
        const filtered = films.filter(f => 
          f.title.toLowerCase().includes(value)
        );
        render(filtered);
      });

      function render(data) {
        const app = document.getElementById("app");
        app.innerHTML = "";

        data.forEach(film => {
          const div = document.createElement("div");

          div.innerHTML = <h2>${film.title}</h2>;

          film.showtimes.forEach(s => {
            div.innerHTML += <p>${s.cinema} — ${s.time} (${s.language})</p>;
          });

          app.appendChild(div);
        });
      }
    </script>
  </body>
</html>
